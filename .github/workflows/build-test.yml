name: Build and Test

on:
  push:
    branches: [ main, 'dynamic-workflow-*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    name: Build Solution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ConvoContentBuddy.slnx

      - name: Build solution
        run: dotnet build ConvoContentBuddy.slnx --configuration ${{ env.CONFIGURATION }} --no-incremental

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/${{ env.CONFIGURATION }}
            **/obj/${{ env.CONFIGURATION }}
          retention-days: 1

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run unit tests
        run: dotnet test tests/ConvoContentBuddy.Tests/ConvoContentBuddy.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults
            **/coverage
          retention-days: 7

  lint:
    name: Lint and Analyze
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Restore dependencies
        run: dotnet restore ConvoContentBuddy.slnx

      - name: Build for CodeQL analysis
        run: dotnet build ConvoContentBuddy.slnx --configuration ${{ env.CONFIGURATION }} --no-incremental

      - name: Run dotnet format
        run: dotnet format ConvoContentBuddy.slnx --verify-no-changes
        continue-on-error: true

      - name: Run Security Scan
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:csharp"

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, test]
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}/convocontentbuddy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push API Brain image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: docker/api-brain.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}-api-brain
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/convocontentbuddy-api-brain

      - name: Build and push UI Web image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: docker/ui-web.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}-ui-web
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/convocontentbuddy-ui-web

      - name: Build and push Data Seeder image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: docker/data-seeder.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}-data-seeder
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/convocontentbuddy-data-seeder
